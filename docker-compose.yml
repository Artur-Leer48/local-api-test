services:
  postgres:
    image: postgres:17
    container_name: gaming_pc_shop_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: artur
      POSTGRES_PASSWORD: password
      POSTGRES_DB: gaming_pc_shop
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: